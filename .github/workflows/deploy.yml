name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Clean up old .htaccess and deploy static files
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          # First, remove the problematic .htaccess from the server
          sshpass -e ssh -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o PreferredAuthentications=keyboard-interactive,password \
            -o PubkeyAuthentication=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "rm -f /home/u695642513/domains/nomadestan.com/public_html/.htaccess && rm -f /home/u695642513/domains/nomadestan.com/public_html/server.js && rm -f /home/u695642513/domains/nomadestan.com/public_html/package.json && rm -f /home/u695642513/domains/nomadestan.com/public_html/package-lock.json && rm -rf /home/u695642513/domains/nomadestan.com/public_html/node_modules"

      - name: Deploy static files to public_html
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          # Deploy only the static files (public/ contents) directly to public_html root
          sshpass -e rsync -avz \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=keyboard-interactive,password -o PubkeyAuthentication=no" \
            public/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/u695642513/domains/nomadestan.com/public_html/"
